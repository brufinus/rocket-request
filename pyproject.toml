[build-system]
requires = ["setuptools>=77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "django-distribute"
version = "1.9.0"
dependencies = ["django>=6.0"]
description = "A Django app to show you how to distribute items amongst rocket silos in Factorio."
readme = "README.rst"
license = "MIT"
requires-python = ">= 3.12"
authors = [{ name = "Bernard Rufinus", email = "cash-debit-reword@duck.com" }]
classifiers = [
    "Environment :: Web Environment",
    "Framework :: Django",
    "Framework :: Django :: 6.0",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Internet :: WWW/HTTP :: Dynamic Content",
]

[project.urls]
Homepage = "https://github.com/brufinus/rocket-request"

[project.optional-dependencies]
dev = [
    "build~=1.5.0",
    "coverage~=7.13.5",
    "djLint~=1.36.4",
    "hypothesis~=6.152.4",
    "pylint~=4.0.5",
    "pytest~=9.0.3",
    "selenium~=4.43.0",
    "setuptools~=82.0.1",
]

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
commit_message = "chore(release): {version}\n\nAutomatically generated by python-semantic-release."

[tool.semantic_release.branches.main]
match = "main"
