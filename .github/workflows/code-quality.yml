name: Test Code Quality

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        name: Run linter
        strategy:
          matrix:
            python-version: ["3.12"]
        steps:
            - uses: actions/checkout@v6
            - id: lint-setup
              uses: ./.github/actions/python-setup
            - name: Run pylint
              run: |
                pylint --ignore tests django_distribute

    tests-and-coverage:
        runs-on: ${{ matrix.os }}
        name: Tests and coverage
        strategy:
          matrix:
            os: [ubuntu-latest, macos-latest, windows-latest]
            python-version: ["3.12", "3.13", "3.14"]
        steps:
            - uses: actions/checkout@v6
            - id: coverage-setup
              uses: ./.github/actions/python-setup
            - name: Run Django tests and coverage
              run: |
                  coverage run runtests.py --exclude-tag selenium
                  coverage report -m
                  coverage html
            - uses: actions/upload-artifact@v7
              with:
                name: coverage
                path: htmlcov

    integration-tests:
        runs-on: ${{ matrix.os }}
        name: Selenium integration tests
        strategy:
          matrix:
            os: [ubuntu-latest, macos-latest, windows-latest]
            python-version: ["3.12", "3.13", "3.14"]
        steps:
            - uses: actions/checkout@v6
            - id: python-setup
              uses: ./.github/actions/python-setup
            - name: Run Selenium tests
              run: python runtests.py --tag selenium
