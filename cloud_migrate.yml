steps:
  - id: build
    name: gcr.io/k8s-skaffold/pack
    args: ["build", "$_IMAGE_NAME", "--builder=gcr.io/buildpacks/builder"]
  - id: push
    name: gcr.io/cloud-builders/docker
    args: ["push", "$_IMAGE_NAME"]
  - id: migrate
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        gcloud beta run jobs deploy migrate \
          --region $_REGION \
          --image "$_IMAGE_NAME" \
          --service-account ${_SERVICE_NAME}-account@${_PROJECT_ID}.iam.gserviceaccount.com \
          --set-env-vars SETTINGS_NAME=$_SECRET_SETTINGS_NAME \
          --command migrate \
          --execute-now
options:
  dynamicSubstitutions: true
substitutions:
  _PROJECT_ID: rocket-request
  _REGION: us-central1
  _SECRET_SETTINGS_NAME: django_settings
  _SERVICE_NAME: distribute-service
  _IMAGE_NAME: ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}
images:
  - "$_IMAGE_NAME"
