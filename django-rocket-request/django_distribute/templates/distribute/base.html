{% load static %}
<link rel="stylesheet" href="{% static 'distribute/style.css' %}" />
<!DOCTYPE html>
<html lang="en-US">
    <head>
        <script>
        if (localStorage.getItem("theme") === "dark") {
          document.documentElement.classList.add("dark-theme");
        }
        </script>
        <meta charset="utf-8" />
        <title>Rocket Request</title>
        <meta name="author" content="brufinus" />
        <meta name="description"
              content="Automatic item distribution across Rocket Silos in Factorio." />
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"
                integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
                crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <img src="#" alt="Insert Logo Here" />
            <h1>Rocket Request</h1>
        </header>
        <nav class="nav-bar">
            <ul class="links-list">
                <li>
                    <a href="#">Home</a>
                </li>
                <li>
                    <a href="https://github.com/brufinus/rocket-request">GitHub</a>
                </li>
                <li>
                    <button id="theme-toggle">Toggle Theme</button>
                </li>
            </ul>
        </nav>
        <main>
            {% block content %}
            {% endblock content %}
        </main>
        <footer>
            <p><a href="mailto:brufinus@duck.com">brufinus@duck.com</a></p>
            <p><a href="https://github.com/brufinus/rocket-request">brufinus/rocket-request</a></p>
        </footer>
    </body>
    <script src="{% static "distribute/theme.js" %}"></script>
</html>
